# NullWire — Release pipeline
# ============================
# This workflow lives in the PUBLIC nullwire-releases repo, but it pulls
# the source from the PRIVATE source repo (yunomiwell/nullwire) using
# a deploy key. Source stays private; only compiled binaries land here.
#
# Trigger: push a tag like `v0.1.0` to THIS public repo. The workflow then:
#   1. Checks out the private source at the matching tag
#   2. Builds nullwire-cli for macOS (arm64 + x86_64) and Linux (x86_64 + arm64)
#   3. (If signing secrets present) codesigns + notarizes macOS binaries
#   4. Bundles the messenger UI into a tarball
#   5. Generates SHA256 checksums for everything
#   6. Publishes a GitHub Release with all artifacts
#
# Required secrets (set in repo Settings → Secrets):
#   PRIVATE_SOURCE_DEPLOY_KEY  — SSH private key with read access to nullwire/nullwire
#   APPLE_DEVELOPER_ID         — (optional, Phase B-3) "Developer ID Application: Your Name (TEAMID)"
#   APPLE_CERT_P12_BASE64      — (optional) base64-encoded p12 certificate
#   APPLE_CERT_PASSWORD        — (optional) password for the p12
#   APPLE_NOTARIZE_USER        — (optional) Apple ID for notarization
#   APPLE_NOTARIZE_PASSWORD    — (optional) app-specific password
#   APPLE_NOTARIZE_TEAM_ID     — (optional) your Apple team ID

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the GitHub Release

# Silence the Node 20 deprecation warnings from GitHub-provided actions.
# GitHub will flip this to the default on 2026-06-02; this just opts in early.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            runner: macos-14
            rust_target: aarch64-apple-darwin
          # macOS x86_64: cross-compile from an arm64 runner because macos-13
          # (Intel) runners were retired by GitHub.  Xcode's SDK on Apple Silicon
          # macOS runners supports x86_64 universally, so `cargo build --target
          # x86_64-apple-darwin` works natively.
          - target: macos-x86_64
            runner: macos-14
            rust_target: x86_64-apple-darwin
          - target: linux-x86_64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
          # linux-arm64 dropped for v0.1.0 — openssl-sys cross-compile needs
          # either a sysroot or vendored openssl.  Add back via `cross` tool
          # in a follow-up release once the main pipeline is proven.

    steps:
      - name: Checkout releases repo (this one)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2

      - name: Checkout private source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
        with:
          repository: yunomiwell/nullwire-core
          ssh-key: ${{ secrets.PRIVATE_SOURCE_DEPLOY_KEY }}
          ref: ${{ github.ref_name }}    # match the tag pushed to releases repo
          path: source

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable, audit-pinned 2026-04-25
        with:
          targets: ${{ matrix.rust_target }}

      - name: Build CLI
        working-directory: source/phase0
        run: |
          cargo build --release --target ${{ matrix.rust_target }} -p nullwire-cli

      - name: Strip binary (Linux)
        if: startsWith(matrix.target, 'linux')
        run: strip source/phase0/target/${{ matrix.rust_target }}/release/nullwire-cli

      - name: Strip binary (macOS)
        if: startsWith(matrix.target, 'macos')
        run: strip source/phase0/target/${{ matrix.rust_target }}/release/nullwire-cli

      # AD-HOC SIGNING (sign with `-` identity, no Developer ID involved).
      #
      # Why ad-hoc instead of Developer ID right now: Apple has marked our
      # team (2BVDP7296P) as revoked in the notary database (Apple support
      # case 102873775642 pending). Any binary signed with our Developer ID
      # gets killed by AMFI on macOS launch ("Malware Blocked and Moved to
      # Trash"). Ad-hoc signing satisfies AMFI's signature requirement on
      # Apple Silicon without invoking the Apple notary system at all.
      #
      # Trade-off: Gatekeeper shows "unidentified developer" on browser-
      # downloaded binaries (right-click→Open bypasses). curl|bash install
      # path is unaffected. This is the same UX as 95% of indie macOS tools.
      #
      # Restore Developer ID signing for v0.1.1 once Apple unblocks the team.
      - name: Codesign (ad-hoc, until Apple unblocks team config)
        if: startsWith(matrix.target, 'macos')
        run: |
          BIN=source/phase0/target/${{ matrix.rust_target }}/release/nullwire-cli
          codesign --force --sign - "$BIN"
          echo "=== verify ad-hoc signature ==="
          codesign -dv --verbose=2 "$BIN" 2>&1 | head -8

      # Notarization DISABLED until Apple Developer Programs Support configures
      # Team 2BVDP7296P for notarization. Apple's notary returns status 7000
      # ("Team is not yet configured for notarization") for every submission.
      # While disabled, binaries ship codesigned-only — Gatekeeper shows
      # "unnotarized Developer ID" (right-click→Open bypasses) instead of
      # the scarier "revoked" verdict that comes from a rejected notary DB
      # entry. Re-enable this step once Apple support resolves the team
      # configuration; track via support case 102873775642.
      - name: Notarize (macOS, DISABLED — Apple team not yet configured)
        if: false
        env:
          APPLE_NOTARIZE_USER: ${{ secrets.APPLE_NOTARIZE_USER }}
          APPLE_NOTARIZE_PASSWORD: ${{ secrets.APPLE_NOTARIZE_PASSWORD }}
          APPLE_NOTARIZE_TEAM_ID: ${{ secrets.APPLE_NOTARIZE_TEAM_ID }}
        run: |
          BIN=source/phase0/target/${{ matrix.rust_target }}/release/nullwire-cli
          ZIP=$RUNNER_TEMP/nullwire-cli.zip
          ditto -c -k --keepParent "$BIN" "$ZIP"
          xcrun notarytool submit "$ZIP" \
            --apple-id "$APPLE_NOTARIZE_USER" \
            --password "$APPLE_NOTARIZE_PASSWORD" \
            --team-id "$APPLE_NOTARIZE_TEAM_ID" \
            --timeout 12m \
            --wait

      - name: Rename binary for upload
        run: |
          cp source/phase0/target/${{ matrix.rust_target }}/release/nullwire-cli \
            ./nullwire-cli-${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: nullwire-cli-${{ matrix.target }}
          path: nullwire-cli-${{ matrix.target }}
          retention-days: 1

  bundle-ui:
    name: Bundle messenger UI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
        with:
          repository: yunomiwell/nullwire-core
          ssh-key: ${{ secrets.PRIVATE_SOURCE_DEPLOY_KEY }}
          ref: ${{ github.ref_name }}
          path: source

      - name: Install Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'

      - name: Install UI dependencies
        working-directory: source/nullwire_messenger
        run: npm ci --ignore-scripts

      - name: Build messenger UI bundle
        working-directory: source/nullwire_messenger
        run: |
          npx esbuild app.jsx --bundle --outfile=app.js --format=esm --jsx=automatic

      - name: Create tarball
        run: |
          cd source/nullwire_messenger
          tar -czf $GITHUB_WORKSPACE/nullwire-ui-${{ github.ref_name }}.tar.gz \
            index.html app.js server.mjs profiles/

      - name: Upload UI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: nullwire-ui-bundle
          path: nullwire-ui-${{ github.ref_name }}.tar.gz
          retention-days: 1

  release:
    name: Publish release
    needs: [build, bundle-ui]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout releases repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Generate SHA256 checksums
        working-directory: release
        run: |
          shasum -a 256 * > checksums.sha256
          cat checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.4.1
        with:
          name: NullWire ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            release/*
            install.sh
          body: |
            ## NullWire ${{ github.ref_name }}

            Post-quantum encrypted messenger over a blockchain-coordinated Sphinx mixnet.

            ### Install
            ```bash
            curl -sSL https://nullwire.xyz/install.sh | bash
            ```

            ### Verify install.sh first (recommended)
            ```bash
            curl -sSL https://nullwire.xyz/install.sh -o install.sh
            shasum -a 256 install.sh   # compare to hash below
            cat install.sh             # review before running
            bash install.sh
            ```

            See `checksums.sha256` for binary hashes.

            ### Status
            Pre-alpha. Crypto hardened (32 fixes, 4 audit passes). Reliability
            verified (100/100 messages, zero drops). External audit pending.

            See https://nullwire.xyz for full documentation.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
